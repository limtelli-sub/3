<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전기 설비 고장 진단 도우미</title>
  <link rel="stylesheet" href="diagnostic.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>전기 설비 고장 진단</h1>
    </header>
    <main class="main-content">
      <textarea id="problem-input" placeholder="전기 설비 문제를 입력하세요..." rows="4"></textarea>
      <button id="diagnose-btn" class="btn">진단하기</button>
    </main>
    <footer class="footer">
      <p>© 2026 전기 설비 진단 도우미</p>
    </footer>
  </div>

  <!-- Result Modal -->
  <div class="modal-overlay" id="result-modal" style="display:none;">
    <div class="modal-content">
      <h2 id="result-title">진단 결과</h2>
      <p id="result-text"></p>
      <button class="btn close-btn" id="close-modal">닫기</button>
    </div>
  </div>

  <script src="diagnostic.js"></script>
</body>
</html>
