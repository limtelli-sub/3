<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기억력 카드 뒤집기 게임</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="app-title">기억력 카드 게임</h1>
      <div class="stats">
        <div class="stat-box">
          <span class="label">시도 횟수:</span>
          <span id="moves">0</span>
        </div>
        <div class="stat-box">
          <span class="label">시간:</span>
          <span id="time">00:00</span>
        </div>
      </div>
      <button class="btn restart-btn" id="restart-btn">다시 시작</button>
    </header>
    
    <main class="game-board" id="game-board">
      <!-- Cards will be generated by JS -->
    </main>

    <a href="index.html" class="nav-link">⬅ 발표 도우미로 돌아가기</a>
  </div>

  <!-- Victory Modal -->
  <div class="modal-overlay" id="victory-modal">
    <div class="modal-content">
      <h2>🎉 게임 클리어! 🎉</h2>
      <p>총 시도 횟수: <span id="final-moves">0</span>회</p>
      <p>걸린 시간: <span id="final-time">00:00</span></p>
      <button class="btn restart-btn" id="modal-restart-btn">다시 플레이</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
